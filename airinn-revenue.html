  @font-face {
    font-family: 'Garage Gothic';

  :root {
    --teal: #003d4c;
    --teal-dark: #002e3a;
    --orange: #c16c18;
    --orange-hover: #d4791f;
    --yellow: #f1b434;
    --brand-white: #f1e6b2;
    --brand-white-85: rgba(241, 230, 178, 0.85);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--teal);
    line-height: 1.6;
    overflow-x: hidden;
    background: var(--brand-white);
  }

  h1, h2, h3, .stat-number {
    font-family: 'Garage Gothic', 'Impact', 'Arial Narrow', 'Helvetica Neue', sans-serif;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: 0.02em;
  }

  .section { padding: 80px 24px; }
  .section-inner { max-width: 1080px; margin: 0 auto; }

  /* ============ ANIMATIONS ============ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(32px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s ease-out, transform 0.5s ease-out;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ============ HERO ============ */
  .hero {
    background: var(--teal);
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 60px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(241,180,52,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -15%;
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(193,108,24,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero .section-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .hero-content { max-width: 560px; }

  .hero h1 {
    font-size: clamp(36px, 5vw, 56px);
    color: var(--brand-white);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0; transform: translateY(24px);
    animation: fadeUp 0.6s ease-out 0.1s forwards;
  }
  .hero h1 .highlight { color: var(--yellow); }

  .hero .subheadline {
    font-size: 19px;
    color: var(--brand-white-85);
    margin-bottom: 32px;
    max-width: 480px;
    opacity: 0; transform: translateY(24px);
    animation: fadeUp 0.6s ease-out 0.25s forwards;
  }

  .hero .supporting-text {
    font-size: 14px;
    color: var(--brand-white-60);
    margin-top: 12px;
    opacity: 0; transform: translateY(24px);
    animation: fadeUp 0.6s ease-out 0.5s forwards;
  }

  .hero-form-card {
    background: #fff;
    border-radius: 12px;
    padding: 40px 32px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    opacity: 0; transform: translateX(32px);
    animation: slideInRight 0.6s ease-out 0.35s forwards;
  }
  .hero-form-card h3 {
    font-size: 22px;
    color: var(--teal);
    margin-bottom: 8px;
    text-transform: none;
    letter-spacing: 0;
  }
  .hero-form-card .form-subtitle {
    font-size: 14px;
    color: var(--gray-muted);
    margin-bottom: 24px;
  }
  .hero-form-card iframe {
    min-height: 600px;
    max-height: 700px;
    overflow: hidden;
    width: 100%;
    min-height: 400px;
    border: none;
    border-radius: 8px;
  }

  /* ============ BUTTONS ============ */
  .btn-primary {
    display: inline-block;
    background: var(--orange);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    padding: 16px 40px;
    border: none;
    border-radius: 8px;

    text-decoration: none;

    transform: scale(1.02);

  .pain-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }

  .pain-card {
    border-top: 3px solid var(--yellow);
    padding: 32px 24px;
    background: #fff;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 4px 20px rgba(0,61,76,0.05);
  }

  .pain-card .pain-icon {
    width: 48px; height: 48px;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(0,61,76,0.06);
  }
  .pain-card .pain-icon svg {
    width: 24px; height: 24px;
    stroke: var(--teal); fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .pain-card h3 {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 12px;
    line-height: 1.3;

  .pain-card p {
    font-size: 15px;
    color: var(--gray-muted);
    line-height: 1.7;

    font-size: 36px;

    margin-bottom: 4px;
    line-height: 1;

  /* ============ SECTION 3: FOUR PATHS ============ */

  }

  .paths-intro {
    text-align: center;
    font-size: 18px;
    color: var(--brand-white-70);
    max-width: 600px;
    margin: 0 auto 56px;
  }

  .tier-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  .tier-card {
    background: rgba(241, 230, 178, 0.06);
    border: 1px solid rgba(241, 230, 178, 0.12);
    border-radius: 12px;
    padding: 32px 24px;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
  }
  .tier-card:hover {
    transform: translateY(-4px);
    border-color: rgba(241, 180, 52, 0.3);
  }

  .tier-card.featured {

    background: rgba(241, 180, 52, 0.08);
  }

  .tier-card .tier-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 12px;

  .tier-badge.diy { background: rgba(241,230,178,0.15); color: var(--brand-white); }
  .tier-badge.guided { background: rgba(241,180,52,0.2); color: var(--yellow); }
  .tier-badge.full { background: var(--yellow); color: var(--teal); }
  .tier-badge.premium { background: var(--orange); color: #fff; }

  .tier-card h3 {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--brand-white);
    margin-bottom: 8px;
    line-height: 1.3;
    letter-spacing: 0;
  }

  .tier-card .tier-price {
    font-size: 15px;
    color: var(--yellow);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .tier-card .tier-desc {
    font-size: 14px;
    color: var(--brand-white-70);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .tier-card ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .tier-card ul li {
    font-size: 14px;
    color: var(--brand-white-85);
    padding: 6px 0;
    padding-left: 20px;
    position: relative;
  }
  .tier-card ul li::before {

    position: absolute;
    left: 0;
    top: 12px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--yellow);

  /* ============ SECTION 4: WHAT SETS AIRINN APART ============ */
  .apart-section { background: var(--brand-white); }

  .apart-section h2 {
    font-size: clamp(28px, 4vw, 42px);
    color: var(--teal);
    text-align: center;
    margin-bottom: 20px;
  }

  .apart-intro {
    text-align: center;
    font-size: 18px;
    color: var(--teal);
    opacity: 0.8;
    max-width: 640px;
    margin: 0 auto 56px;
  }

  .apart-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }

  .apart-card {
    padding: 32px;
    background: #fff;
    border-radius: 12px;
    border-left: 4px solid var(--yellow);
    box-shadow: 0 4px 20px rgba(0,61,76,0.05);
  }
  .apart-card h3 {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 12px;
    line-height: 1.3;

    color: var(--gray-muted);

  }

  /* ============ SECTION 5: REAL RESULTS ============ */
  .results-section { background: var(--teal); }

  .result-cards {

  .result-card {

  .result-card .result-location {

  .result-card .stat-item {

    background: #fff;
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(0,61,76,0.08);

  .resource-box h3 {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 8px;
    line-height: 1.3;
    letter-spacing: 0;
  }
  .resource-box .resource-subtitle {
    font-size: 14px;
    color: var(--gray-muted);
    margin-bottom: 24px;

  .inline-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }
  .inline-form .form-group { text-align: left; }
  .inline-form .form-group label {
    display: block;

    font-weight: 600;

  .inline-form .form-group input {

  .inline-form .btn-primary {

  /* ============ SECTION 7: BOTTOM CTA ============ */
  .bottom-cta {

  .bottom-cta h2 {

  .bottom-cta .form-container {

  /* ============ FOOTER ============ */
  .footer {
    background: var(--teal-dark);
    padding: 40px 24px;

  }
  .footer p {
    font-size: 13px;
    color: var(--brand-white-60);
  }
  .footer a {

  /* ============ MOBILE ============ */

    .hero .section-inner {

    .inline-form {
      grid-template-columns: 1fr;
    }

    }
  }

  @media (max-width: 600px) {
    .section { padding: 48px 20px; }
    .tier-cards {
      grid-template-columns: 1fr;
    }

  }

<script>
  // Scroll reveal
  (function() {
    var reveals = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      reveals.forEach(function(el) { el.classList.add('visible'); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    reveals.forEach(function(el) { observer.observe(el); });
  })();
</script>
