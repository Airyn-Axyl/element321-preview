<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Should Your Airbnb Be Making? | AirINN</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f6f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .wrapper {
    width: 100%;
    max-width: 580px;
  }

  .header {
    background: #003d4c;
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 28px 32px 24px;
    text-align: left;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .header p {
    font-size: 14px;
    opacity: 0.78;
    line-height: 1.5;
  }

  .widget-container {
    background: #fff;
    border-radius: 0 0 12px 12px;
    padding: 28px 32px 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* Style the PriceLabs widget container */
  #pricelabs-re-widget-div {
    width: 100%;
    min-height: 280px;
  }

  .cta-section {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #eee;
    text-align: center;
  }

  .cta-section p {
    font-size: 13px;
    color: #666;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .cta-btn {
    display: inline-block;
    background: #c16c18;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 13px 28px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .cta-btn:hover {
    background: #a85c12;
  }

  .footer {
    margin-top: 18px;
    text-align: center;
    font-size: 11px;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>What Should Your Airbnb Be Making?</h1>
    <p>Get an instant revenue estimate powered by real market data.</p>
  </div>

  <div class="widget-container">

    <!-- PriceLabs Revenue Estimator Widget -->
    <div id="pricelabs-re-widget-div"></div>

    <div class="cta-section">
      <p>Ready to see what your property could earn with professional management?</p>
      <a class="cta-btn" href="https://calendly.com/airinn/discovery" target="_blank">
        Book a Free Discovery Call
      </a>
    </div>

  </div>

  <div class="footer">
    Powered by PriceLabs market data &nbsp;&bull;&nbsp; &copy; AirINN Property Management
  </div>
</div>

<!-- PriceLabs Revenue Estimator Widget Script -->
<script type="text/javascript" src="https://api.pricelabs.co/widgets/re_widget"></script>

</body>
</html>
